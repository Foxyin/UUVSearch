# UUVSearch - 连续环境配置（奖励调优版）
map:
  type: "square"
  length: 420.0
  resolution: 30.0
  obstacle_ratio: 0.1

auv:
  cruise_speed: 1.0
  time_step: 30.0            # 30m/步=1格，更精细控制
  max_heading_change: 90
  init_pos: [30.0, 30.0]
  init_heading: 0.0

sonar:
  type: "circle"
  max_range: 3          # 缩小声呐范围，增加搜索难度
  sector_angle: 120
  attenuation: 0.3      # 距离衰减系数，配合贝叶斯更新

info_map:
  kappa_max: 1.0
  growth_factor: 50

obs_patch_radius: 5

rewards:
  coverage_gain: 1.0          # 首次覆盖新格子
  revisit_gain: 0.1           # 重复访问已覆盖格子（微弱正奖励）
  find_target: 100.0
  collision_penalty: -2.0     # 大幅降低（原-50）
  step_penalty: -0.05         # 每步微小惩罚，鼓励高效

simulation:
  max_steps: 300    # 14x14网格+声呐3，~300步足够有效搜索且保持难度