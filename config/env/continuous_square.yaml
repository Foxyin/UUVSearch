# UUVSearch - 连续环境配置（奖励调优版）
map:
  type: "square"
  length: 420.0
  resolution: 30.0
  obstacle_ratio: 0.1

auv:
  cruise_speed: 1.0
  time_step: 60.0
  max_heading_change: 90
  init_pos: [30.0, 30.0]
  init_heading: 0.0

sonar:
  type: "circle"
  max_range: 5
  sector_angle: 120

info_map:
  kappa_max: 1.0
  growth_factor: 50

obs_patch_radius: 5

rewards:
  coverage_gain: 1.0          # 首次覆盖新格子
  revisit_gain: 0.1           # 重复访问已覆盖格子（微弱正奖励）
  find_target: 100.0
  collision_penalty: -2.0     # 大幅降低（原-50）
  step_penalty: -0.05         # 每步微小惩罚，鼓励高效

simulation:
  max_steps: 500