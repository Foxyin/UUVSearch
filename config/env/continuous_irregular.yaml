# UUVSearch - 不规则多边形连续环境配置
map:
  type: "irregular"
  length: 420.0
  resolution: 30.0
  # 八边形顶点 (网格坐标)
  polygon:
    - [2, 2]
    - [2, 12]
    - [5, 14]
    - [9, 14]
    - [12, 12]
    - [12, 2]
    - [9, 0]
    - [5, 0]
  # 内部障碍物 (网格坐标: row, col, 半径)
  obstacles:
    - [4, 4, 2]
    - [10, 10, 2]

auv:
  cruise_speed: 1.0
  time_step: 30.0            # 30m/步=1格，更精细控制
  max_heading_change: 90
  init_pos: [30.0, 30.0]
  init_heading: 0.0

sonar:
  type: "circle"
  max_range: 3          # 缩小声呐范围，增加搜索难度
  sector_angle: 120
  attenuation: 0.3      # 距离衰减系数，配合贝叶斯更新

info_map:
  kappa_max: 1.0
  growth_factor: 50

obs_patch_radius: 5

rewards:
  coverage_gain: 1.0
  revisit_gain: 0.0
  find_target: 100.0
  collision_penalty: -2.0
  step_penalty: -0.05

simulation:
  max_steps: 300    # 与 continuous_square 保持一致